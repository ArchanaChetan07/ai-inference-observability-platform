{{- if .Values.vllm.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vllm-latency-metrics.fullname" . }}-vllm
  labels:
    {{- include "vllm-latency-metrics.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  type: {{ .Values.vllm.service.type }}
  selector:
    {{- include "vllm-latency-metrics.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
  ports:
    - name: http
      port: {{ .Values.vllm.service.port }}
      targetPort: http
{{- end }}
