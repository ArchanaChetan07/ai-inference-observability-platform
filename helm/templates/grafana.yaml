{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm-latency-metrics.fullname" . }}-grafana
  labels:
    {{- include "vllm-latency-metrics.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vllm-latency-metrics.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "vllm-latency-metrics.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | quote }}
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            {{- if .Values.prometheus.enabled }}
            - name: GF_INSTALL_PLUGINS
              value: ""
            {{- end }}
          ports:
            - containerPort: {{ .Values.grafana.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vllm-latency-metrics.fullname" . }}-grafana
  labels:
    {{- include "vllm-latency-metrics.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "vllm-latency-metrics.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  ports:
    - port: {{ .Values.grafana.service.port }}
      targetPort: {{ .Values.grafana.service.port }}
{{- end }}
