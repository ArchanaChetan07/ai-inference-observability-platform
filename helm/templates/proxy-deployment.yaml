{{- if .Values.proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm-latency-metrics.fullname" . }}-proxy
  labels:
    {{- include "vllm-latency-metrics.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  replicas: {{ .Values.proxy.replicaCount }}
  selector:
    matchLabels:
      {{- include "vllm-latency-metrics.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "vllm-latency-metrics.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.proxy.port | quote }}
        prometheus.io/path: "/metrics"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "vllm-latency-metrics.fullname" . }}-proxy
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.priorityClass.enabled }}
      priorityClassName: {{ include "vllm-latency-metrics.fullname" . }}-inference
      {{- end }}
      {{- if .Values.proxy.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "vllm-latency-metrics.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: proxy
      {{- else if .Values.proxy.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.proxy.topologySpreadConstraints | nindent 8 }}
      {{- end }}
      containers:
        - name: proxy
          image: "{{ .Values.proxy.image.repository }}:{{ .Values.proxy.image.tag }}"
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.proxy.port }}
          envFrom:
            - configMapRef:
                name: {{ include "vllm-latency-metrics.fullname" . }}-config
          env:
            - name: LOG_LEVEL
              value: {{ .Values.proxy.logLevel | quote }}
            - name: STATS_WINDOW
              value: {{ .Values.proxy.statsWindow | quote }}
            - name: PROXY_PORT
              value: {{ .Values.proxy.port | quote }}
            {{- range $k, $v := .Values.proxy.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.proxy.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
{{- end }}
