groups:
  - name: vllm_latency_slos
    interval: 30s
    rules:
      - alert: HighTTFT
        expr: |
          histogram_quantile(0.99,
            rate(vllm_proxy_ttft_milliseconds_bucket[5m])
          ) > 2000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "vLLM TTFT p99 is high"
          description: "TTFT p99 = {{ $value | humanize }}ms (threshold: 2000ms)"

      - alert: CriticalTTFT
        expr: |
          histogram_quantile(0.99,
            rate(vllm_proxy_ttft_milliseconds_bucket[5m])
          ) > 5000
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "vLLM TTFT p99 is critically high"
          description: "TTFT p99 = {{ $value | humanize }}ms (threshold: 5000ms)"

      - alert: HighTBT
        expr: |
          histogram_quantile(0.99,
            rate(vllm_proxy_tbt_milliseconds_bucket[5m])
          ) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "vLLM TBT p99 is high"
          description: "TBT p99 = {{ $value | humanize }}ms (threshold: 500ms)"

      - alert: HighErrorRate
        expr: |
          rate(vllm_proxy_requests_total{status=~"5..|0|error"}[5m])
          /
          rate(vllm_proxy_requests_total[5m])
          > 0.05
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "vLLM proxy error rate > 5%"
          description: "Error rate = {{ $value | humanizePercentage }}"

      - alert: NoRequests
        expr: |
          rate(vllm_proxy_requests_total[10m]) == 0
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "No requests to vLLM proxy in 10 minutes"
