apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vllm

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - pvc.yaml
  - vllm-deployment.yaml
  - vllm-service.yaml
  - proxy-deployment.yaml
  - proxy-service.yaml
  - networkpolicy.yaml
  - priorityclass.yaml
  - hpa.yaml
  - pdb.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: vllm-latency-metrics
      app.kubernetes.io/version: "1.2.0"
    includeSelectors: false
