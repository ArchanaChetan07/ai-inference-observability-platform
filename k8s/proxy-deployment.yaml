apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-latency-proxy
  namespace: vllm
  labels:
    app: vllm-latency-proxy
    app.kubernetes.io/component: metrics-proxy
    app.kubernetes.io/part-of: vllm-latency-metrics
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: vllm-latency-proxy
  template:
    metadata:
      labels:
        app: vllm-latency-proxy
        app.kubernetes.io/component: metrics-proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: vllm-latency-proxy
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          image: ghcr.io/ArchanaChetan07/vllm-latency-proxy:1.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: vllm-latency-config
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: vllm-latency-config
                  key: PROXY_LOG_LEVEL
            - name: STATS_WINDOW
              valueFrom:
                configMapKeyRef:
                  name: vllm-latency-config
                  key: PROXY_STATS_WINDOW
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
