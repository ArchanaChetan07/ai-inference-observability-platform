name: CI/CD — AI Inference Observability Platform

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vllm-latency-proxy
  PYTHON_VERSION: "3.11"
  HELM_VERSION: v3.14.4
  KUBECONFORM_VERSION: v0.6.7

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy types-requests

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format (Black-compatible)
        run: ruff format --check .

      - name: mypy type check
        run: |
          pip install -r requirements.txt
          mypy

  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/ -m "unit or integration or regression" \
            --tb=short \
            --cov=proxy \
            --cov=vllm_patch \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  helm-k8s:
    name: Helm & Kubernetes Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm lint
        run: |
          helm lint ./helm
          helm lint ./helm -f helm/values-prod.yaml
          helm lint ./helm -f helm/values-dev.yaml
          helm lint ./helm -f helm/values-docker-desktop.yaml

      - name: Helm template
        run: |
          helm template latency-metrics ./helm \
            --set vllm.hfTokenSecretName=hf-token \
            -f helm/values-prod.yaml \
            > /tmp/helm-rendered.yaml
          test -s /tmp/helm-rendered.yaml

      - name: Kustomize build
        run: kubectl kustomize k8s/ > /tmp/k8s-rendered.yaml

      - name: Install kubeconform
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Validate manifests (kubeconform — no cluster required)
        run: |
          kubeconform -summary -ignore-missing-schemas /tmp/k8s-rendered.yaml
          kubeconform -summary -ignore-missing-schemas /tmp/helm-rendered.yaml

      - name: Cluster dry-run (only when API server is available)
        run: |
          if kubectl cluster-info --request-timeout=5s >/dev/null 2>&1; then
            echo "Kubernetes cluster detected — running server-side dry-run"
            kubectl apply --dry-run=server -f /tmp/k8s-rendered.yaml
            kubectl apply --dry-run=server -f /tmp/helm-rendered.yaml
          else
            echo "No Kubernetes cluster available — skipping kubectl apply"
            echo "Offline validation (helm lint, template, kustomize, kubeconform) completed successfully"
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Bandit SAST
        run: |
          pip install bandit
          bandit -r proxy.py vllm_patch/ -ll

      - name: pip-audit dependency scan
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
        continue-on-error: true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"

  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [test, helm-k8s, security]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Trivy image scan
        if: steps.build.outcome == 'success'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: "0"
        continue-on-error: true

      - name: Generate SBOM
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-vllm-latency-proxy
          output-file: sbom.spdx.json
          path: .
        continue-on-error: true

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package ./helm --destination dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tgz

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, helm-k8s, security, docker]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "lint=${{ needs.lint.result }}"
          echo "test=${{ needs.test.result }}"
          echo "helm-k8s=${{ needs.helm-k8s.result }}"
          echo "security=${{ needs.security.result }}"
          echo "docker=${{ needs.docker.result }}"
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.helm-k8s.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.docker.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
