global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: vllm-latency-metrics
    environment: local

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: vllm-latency-proxy
    static_configs:
      - targets: ["proxy:8080"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
