# =============================================================================
# vLLM Latency Metrics — Full Local Stack
# =============================================================================
# Services:
#   vllm        — vLLM serving (GPU-accelerated, T1000 compatible)
#   proxy       — Latency metrics proxy (Project 1A)
#   prometheus  — Metrics collection
#   grafana     — Dashboards
#
# Usage:
#   # First, export your HuggingFace token:
#   export HF_TOKEN=hf_...
#
#   # Start everything:
#   docker-compose up -d
#
#   # Access points:
#   #   vLLM (raw):    http://localhost:8000
#   #   Proxy (with metrics): http://localhost:8080
#   #   Grafana:       http://localhost:3000  (admin/admin)
#   #   Prometheus:    http://localhost:9090
#
#   # Tail logs:
#   docker-compose logs -f proxy
#
#   # Stop:
#   docker compose -f docker/docker-compose.yml up -d

networks:
  vllm-net:
    driver: bridge

volumes:
  hf-cache:
  prometheus-data:
  grafana-data:

services:
  # ---------------------------------------------------------------------------
  # vLLM — OpenAI-compatible LLM server
  # T1000 8GB config: opt-1.3b fits in 8GB with xformers backend
  # ---------------------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:v0.4.3
    container_name: vllm
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_ATTENTION_BACKEND=XFORMERS          # Required for T1000 (SM75)
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    networks:
      - vllm-net
    command: >
      --model ${VLLM_MODEL:-facebook/opt-1.3b}
      --dtype float16
      --max-model-len ${MAX_MODEL_LEN:-2048}
      --gpu-memory-utilization ${GPU_MEM_UTIL:-0.85}
      --disable-log-requests
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
      start_interval: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Latency Metrics Proxy (Project 1A)
  # ---------------------------------------------------------------------------
  proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: vllm-latency-proxy
    environment:
      - VLLM_BASE_URL=http://vllm:8000
      - PROXY_HOST=0.0.0.0
      - PROXY_PORT=8080
      - LOG_LEVEL=INFO
      - STATS_WINDOW=1000
    ports:
      - "${PROXY_PORT:-8082}:8080"
    networks:
      - vllm-net
    depends_on:
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8080"
      - "prometheus.path=/metrics"

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics scraper
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - vllm-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Alertmanager — Alert routing
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - vllm-net
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--web.external-url=http://localhost:9093"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — Dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=localhost
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    ports:
      - "3000:3000"
    networks:
      - vllm-net
    depends_on:
      - prometheus
    restart: unless-stopped
