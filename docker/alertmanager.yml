global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: default
      repeat_interval: 1h

receivers:
  - name: default
    # Local dev: alerts visible at http://localhost:9093/#/alerts
    # Production: add slack_configs, email_configs, or pagerduty_configs here.

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname]
