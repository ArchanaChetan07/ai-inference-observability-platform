name: CI/CD — vLLM Latency Metrics Proxy

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vllm-latency-proxy
  PYTHON_VERSION: "3.11"

jobs:
  # ===========================================================================
  # Job 1: Lint & Type Check
  # ===========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff mypy types-requests

      - name: Ruff lint
        run: ruff check proxy.py vllm_patch/ tests/

      - name: Ruff format check
        run: ruff format --check proxy.py vllm_patch/ tests/

      - name: mypy type check
        run: |
          pip install -r requirements.txt
          mypy proxy.py vllm_patch/outputs.py --ignore-missing-imports

  # ===========================================================================
  # Job 2: Unit & Integration Tests
  # ===========================================================================
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ -m "unit" -v --tb=short

      - name: Run integration tests
        run: pytest tests/ -m "integration" -v --tb=short

      - name: Run benchmark tests
        run: pytest tests/ -m "benchmark" -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: .pytest_results/

  # ===========================================================================
  # Job 3: Security Scan
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install bandit
        run: pip install bandit safety
      - name: Bandit security scan
        run: bandit -r proxy.py vllm_patch/ -ll
      - name: Safety dependency scan
        run: safety check -r requirements.txt

  # ===========================================================================
  # Job 4: Docker Build & Push
  # ===========================================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, security]
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ===========================================================================
  # Job 5: Helm Lint & Validate
  # ===========================================================================
  helm:
    name: Helm Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Helm lint
        run: helm lint helm/vllm-latency-metrics/

      - name: Helm template (dry-run)
        run: |
          helm template vllm-latency-metrics helm/vllm-latency-metrics/ \
            --set vllm.hfTokenSecretName=hf-token \
            --debug > /dev/null

      - name: Validate k8s manifests (kubeval)
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          ./kubeval k8s/manifests.yaml --ignore-missing-schemas

  # ===========================================================================
  # Job 6: Release — tag-triggered deployment smoke test
  # ===========================================================================
  release:
    name: Release Smoke Test
    runs-on: ubuntu-latest
    needs: [docker, helm]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Start proxy with docker-compose (mock mode)
        run: |
          cd docker
          VLLM_BASE_URL=http://httpbin.org \
          docker compose up -d proxy 2>/dev/null || true
          sleep 5

      - name: Smoke test /health
        run: |
          curl -f http://localhost:8080/health || \
            (echo "Health check failed"; exit 1)

      - name: Smoke test /metrics
        run: |
          curl -f http://localhost:8080/metrics | grep vllm_proxy_ttft_milliseconds

      - name: Smoke test /latency/stats
        run: |
          curl -f http://localhost:8080/latency/stats

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            k8s/manifests.yaml
            helm/vllm-latency-metrics/values.yaml
