[tool.ruff]
target-version = "py310"
line-length = 100
src = ["proxy.py", "vllm_patch", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true

[tool.pytest.ini_options]
markers = [
    "unit: fast isolated tests",
    "integration: mocked upstream tests",
    "e2e: requires live vLLM",
    "benchmark: latency benchmark tests",
    "regression: regression suite",
]
