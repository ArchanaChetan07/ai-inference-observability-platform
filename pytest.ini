[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -v --tb=short --strict-markers
markers =
    unit: fast unit tests, no network
    integration: FastAPI integration tests with mocked upstream
    e2e: end-to-end tests requiring running vLLM (skipped by default)
    benchmark: performance benchmark tests
    regression: backward-compatibility regression tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
